<body>
  <div class="reveal">

      <section data-markdown="slides.md?v=20260404ax" data-separator="^---$" data-separator-vertical="^--$"

  <a class="corner-brand" href="#/" aria-label="Back to start slide">
    <img src="assets/formation-logo-text-white.png" alt="FORMATION" />
  </a>

  <div class="slide-footer">
    <div class="footer-meta">
      <button type="button" class="theme-menu-toggle" aria-label="Open theme menu" aria-haspopup="dialog"
        aria-expanded="false" aria-controls="theme-modal" title="Theme menu">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3 14.2 7.8 19 10l-4.8 2.2L12 17l-2.2-4.8L5 10l4.8-2.2Z"></path>

        <span aria-hidden="true">&times;</span>
      </button>
      <span>&copy; 2026 FORMATION GmbH</span>
      <a href="https://tryformation.com" target="_blank" rel="noreferrer noopener">TRYFORMATION.COM</a>
      <span class="footer-divider" aria-hidden="true">|</span>
      <span id="deploy-timestamp" class="deploy-timestamp" aria-live="polite"></span>
    </div>
    <div class="footer-nav">
      <span id="slide-counter"></span>
      <button type="button" class="overview-toggle" aria-label="Toggle slide overview" title="Slide overview">
        <svg class="overview-icon overview-icon-grid" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1.2"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.2"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.2"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.2"></rect>
        </svg>
        <svg class="overview-icon overview-icon-close" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6 18 18"></path>
          <path d="M18 6 6 18"></path>
        </svg>
      </button>
      <div class="language-switch" role="group" aria-label="Presentation language">
        <button type="button" class="language-option is-active" data-language="en" aria-pressed="true">EN</button>
        <button type="button" class="language-option" data-language="de" aria-pressed="false">DE</button>
      </div>
    </div>
  </div>

  <div class="theme-modal-backdrop" id="theme-modal-backdrop" hidden></div>
  <div class="theme-modal" id="theme-modal" role="dialog" aria-modal="true" aria-label="Deck theme" hidden>
    <div class="theme-switch" role="group" aria-label="Deck theme">
      <button type="button" class="theme-option" data-theme="formation" aria-pressed="false">FORMATION</button>
      <button type="button" class="theme-option is-active" data-theme="lear" aria-pressed="true">LEAR</button>
      <button type="button" class="theme-option" data-theme="lear-light" aria-pressed="false">LEAR LIGHT</button>
    </div>
  </div>

  <script src="https://unpkg.com/reveal.js@5.0.5/dist/reveal.js"></script>
  <script src="https://unpkg.com/reveal.js@5.0.5/plugin/notes/notes.js"></script>
  <script src="https://unpkg.com/reveal.js@5.0.5/plugin/markdown/markdown.js"></script>

  <script>
    const DECK_VERSION = '20260404ax';
    const DECK_LANG_KEY = 'formation-deck-language';
    const DECK_THEME_KEY = 'formation-deck-theme';
    const DEPLOY_META_URL = `assets/deploy-meta.json?v=${DECK_VERSION}`;
    const DECK_SOURCES = {

    const LANGUAGE_COPY = {

      },

    const THEME_BACKGROUNDS = {
      formation: {

        },
        platform: {
          type: 'video',
          url: 'https://tryformation.com/video/army-formation.mp4'
        },
        roadmap: {

          url: 'https://tryformation.com/video/army-formation.mp4'
        },
        end: {

      },

        },

        },

        },

        },

        },

        }

      'lear-light': {

        },
        intro: {

          url: 'assets/lear-hero.webp'
        },
        platform: {

          url: 'assets/lear-seat.webp'
        },
        roadmap: {

          url: 'assets/lear-customer-experience.webp'
        },
        'packages-a': {

          url: 'assets/lear-hero-3.webp'
        },
        'packages-b': {
          type: 'image',
          url: 'assets/lear-hero.webp'
        },
        support: {
          type: 'image',
          url: 'assets/lear-customer-experience.webp'
        },
        summary: {
          type: 'image',
          url: 'assets/lear-seat.webp'
        },
        closing: {
          type: 'image',
          url: 'assets/lear-hero-3.webp'
        },
        end: {

          url: 'assets/panattoni-park-bremen-6.jpg'
        }
      }
    };

    let currentLanguage = 'en';
    let currentTheme = 'lear';
    let deployMetadata = null;
    let localUpdatedAt = '';

    function normalizeLanguage(language) {
      return Object.prototype.hasOwnProperty.call(DECK_SOURCES, language) ? language : 'en';
    }

    function getLanguageFromLocation() {
      const params = new URLSearchParams(window.location.search);
      return normalizeLanguage(params.get('lang') || '');
    }

    function persistLanguage(language) {
      try {
        window.localStorage.setItem(DECK_LANG_KEY, language);
      } catch (error) {
        // Ignore localStorage access failures and continue with in-memory state.
      }
    }

    function getPreferredLanguage() {
      const locationLanguage = getLanguageFromLocation();
      if (locationLanguage !== 'en' || new URLSearchParams(window.location.search).has('lang')) {
        return locationLanguage;
      }

      try {
        return normalizeLanguage(window.localStorage.getItem(DECK_LANG_KEY) || 'en');
      } catch (error) {
        return 'en';
      }
    }

    function normalizeTheme(theme) {
      return theme === 'formation' || theme === 'lear' || theme === 'lear-light' ? theme : 'lear';
    }

    function persistTheme(theme) {
      try {
        window.localStorage.setItem(DECK_THEME_KEY, theme);
      } catch (error) {
        // Ignore localStorage access failures and continue with in-memory state.
      }
    }

    function getPreferredTheme() {
      try {
        return normalizeTheme(window.localStorage.getItem(DECK_THEME_KEY) || 'lear');
      } catch (error) {
        return 'lear';
      }
    }

    function applyTheme(theme) {
      currentTheme = normalizeTheme(theme);
      document.body.setAttribute('data-theme', currentTheme);

      const switcher = document.querySelector('.theme-switch');
      const copy = THEME_COPY[currentLanguage] || THEME_COPY.en;
      if (switcher) {
        switcher.setAttribute('aria-label', copy.switchLabel);
      }

      document.querySelectorAll('.theme-option').forEach(button => {
        const isActive = button.dataset.theme === currentTheme;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    function applyLanguageMetadata(language) {
      const copy = LANGUAGE_COPY[language] || LANGUAGE_COPY.en;
      document.documentElement.lang = copy.htmlLang;
      document.title = copy.title;

      const switcher = document.querySelector('.language-switch');
      if (switcher) {
        switcher.setAttribute('aria-label', copy.switchLabel);
      }

      const themeSwitcher = document.querySelector('.theme-switch');
      const themeCopy = THEME_COPY[language] || THEME_COPY.en;
      if (themeSwitcher) {
        themeSwitcher.setAttribute('aria-label', themeCopy.switchLabel);
      }

      const themeMenuToggle = document.querySelector('.theme-menu-toggle');
      if (themeMenuToggle) {
        themeMenuToggle.setAttribute('aria-label', themeCopy.openLabel);
        themeMenuToggle.setAttribute('title', themeCopy.toggleTitle);
      }

      const themeModalClose = document.querySelector('.theme-modal-close');
      if (themeModalClose) {
        themeModalClose.setAttribute('aria-label', themeCopy.closeLabel);
        themeModalClose.setAttribute('title', themeCopy.closeLabel);
      }

      document.querySelectorAll('.language-option').forEach(button => {
        const isActive = button.dataset.language === language;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      renderDeployTimestamp();
    }

    function applyDeckSource(language) {
      const slideSource = document.querySelector('.reveal .slides > section[data-markdown]');
      if (!slideSource) {
        return;
      }

      slideSource.setAttribute('data-markdown', DECK_SOURCES[language]);
    }

    function updateLanguageLocation(language) {
      const url = new URL(window.location.href);
      if (language === 'en') {
        url.searchParams.delete('lang');
      } else {
        url.searchParams.set('lang', language);
      }

      return url.toString();
    }

    function switchDeckLanguage(language) {
      const nextLanguage = normalizeLanguage(language);
      if (nextLanguage === currentLanguage) {
        return;
      }

      persistLanguage(nextLanguage);
      document.body.classList.add('language-switching');
      window.location.replace(updateLanguageLocation(nextLanguage));
    }

    function switchDeckTheme(theme) {
      const nextTheme = normalizeTheme(theme);
      if (nextTheme === currentTheme) {
        return;
      }

      persistTheme(nextTheme);
      document.body.classList.add('theme-switching');
      applyTheme(nextTheme);
      applyThemeBackgrounds();
      window.setTimeout(() => {
        document.body.classList.remove('theme-switching');
      }, 180);
    }

    function applyThemeBackgrounds() {
      const slides = Array.from(document.querySelectorAll('.reveal .slides section[data-theme-background]'));
      if (!slides.length) {
        return;
      }

      const backgroundConfig = THEME_BACKGROUNDS[currentTheme] || THEME_BACKGROUNDS.lear;

      slides.forEach(slide => {
        const key = slide.dataset.themeBackground;
        const config = backgroundConfig[key];
        slide.removeAttribute('data-background-image');
        slide.removeAttribute('data-background-video');
        slide.removeAttribute('data-background-video-loop');
        slide.removeAttribute('data-background-video-muted');
        slide.removeAttribute('data-background-size');
        slide.removeAttribute('data-background-position');

        if (!config) {
          return;
        }

        if (config.type === 'video') {
          slide.setAttribute('data-background-video', config.url);
          slide.setAttribute('data-background-video-loop', 'true');
          slide.setAttribute('data-background-video-muted', 'true');
          return;
        }

        slide.setAttribute('data-background-image', config.url);
        slide.setAttribute('data-background-size', 'cover');
        slide.setAttribute('data-background-position', 'center center');
      });

      if (typeof Reveal.sync === 'function') {
        Reveal.sync();
      }

      window.requestAnimationFrame(() => {
        syncBackgroundClasses();
        syncChromeSoon();
        relayoutSoon();
      });
    }

    function openThemeModal() {
      const modal = document.getElementById('theme-modal');
      const backdrop = document.getElementById('theme-modal-backdrop');
      const toggle = document.querySelector('.theme-menu-toggle');
      if (!modal || !backdrop) {
        return;
      }

      modal.hidden = false;
      backdrop.hidden = false;
      document.body.classList.add('theme-modal-open');
      toggle?.setAttribute('aria-expanded', 'true');
      window.requestAnimationFrame(() => {
        modal.classList.add('is-open');
        backdrop.classList.add('is-open');
      });
    }

    function closeThemeModal() {
      const modal = document.getElementById('theme-modal');
      const backdrop = document.getElementById('theme-modal-backdrop');
      const toggle = document.querySelector('.theme-menu-toggle');
      if (!modal || !backdrop) {
        return;
      }

      modal.classList.remove('is-open');
      backdrop.classList.remove('is-open');
      document.body.classList.remove('theme-modal-open');
      toggle?.setAttribute('aria-expanded', 'false');
      window.setTimeout(() => {
        modal.hidden = true;
        backdrop.hidden = true;
      }, 160);
    }

    function syncChrome(slide) {
      const isOverview = typeof Reveal.isOverview === 'function' ? Reveal.isOverview() : false;
      const indices = Reveal.getIndices(slide);
      const totalSlides = Reveal.getTotalSlides();
      const isFirstSlide = indices.h === 0;
      const isLastSlide = indices.h === totalSlides - 1;
      const hasSlideBackgroundVideo = slide.hasAttribute('data-background-video');
      const isTitle = slide.classList.contains('title-slide') || isFirstSlide || isLastSlide;
      const keepFooterVisible = isFirstSlide || isLastSlide;
      const isCoverSlide =
        slide.classList.contains('proposal-cover') ||
        slide.classList.contains('end-cover') ||
        isFirstSlide ||
        isLastSlide;
      const activeBackground = document.querySelector('.backgrounds .slide-background.present');
      const activeBackgroundHasVideo = !!activeBackground?.querySelector('video');
      const isVideoHero = hasSlideBackgroundVideo || activeBackgroundHasVideo;
      const isPlatformVideoSlide =
        slide.classList.contains('platform-video-slide') &&
        (hasSlideBackgroundVideo || activeBackgroundHasVideo);
      document.querySelector('.slide-footer').style.display =
        (isTitle && !keepFooterVisible) ? 'none' : '';
      document.querySelector('.corner-brand').style.display = isTitle || isOverview ? 'none' : '';
      document.body.classList.toggle('overview-active', isOverview);
      const overviewToggle = document.querySelector('.overview-toggle');
      const copy = LANGUAGE_COPY[currentLanguage] || LANGUAGE_COPY.en;
      if (overviewToggle) {
        overviewToggle.setAttribute('aria-label', isOverview ? copy.overviewClose : copy.overviewOpen);
        overviewToggle.setAttribute('title', isOverview ? copy.overviewTitleClose : copy.overviewTitleOpen);
      }
      document.querySelector('.reveal-viewport')?.classList.toggle('video-slide-active', !isOverview && isVideoHero);
      document.body.classList.toggle('video-slide-active', !isOverview && isVideoHero);
      document.body.classList.toggle('cover-slide-active', !isOverview && isCoverSlide);
      document.body.classList.toggle('platform-video-active', !isOverview && isPlatformVideoSlide);
      syncActiveVideoPlayback({ isPlatformVideoSlide: !isOverview && isPlatformVideoSlide });
    }

    function syncActiveVideoPlayback({ isPlatformVideoSlide }) {
      const activeVideo = document.querySelector('.backgrounds .slide-background.present video');
      if (!activeVideo) {
        return;
      }

      activeVideo.playbackRate = isPlatformVideoSlide ? 0.58 : 1;
      activeVideo.muted = true;
      activeVideo.loop = true;

      const playPromise = activeVideo.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => { });
      }
    }

    function updateSlideCount() {
      const footer = document.getElementById('slide-counter');
      const idx = Reveal.getSlidePastCount() + 1;
      const total = Reveal.getTotalSlides();
      const copy = LANGUAGE_COPY[currentLanguage] || LANGUAGE_COPY.en;
      footer.textContent = `${copy.slideLabel} ${idx} ${copy.ofLabel} ${total}`;
    }

    function formatDeployTimestamp(isoString, language) {
      if (!isoString) {
        return '';
      }

      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) {
        return isoString;
      }

      return new Intl.DateTimeFormat(language === 'de' ? 'de-DE' : 'en-GB', {
        year: 'numeric',
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        timeZone: 'Europe/Berlin',
        timeZoneName: 'short'
      }).format(date);
    }

    function isLocalPreview() {
      const { hostname, protocol } = window.location;
      return protocol === 'file:' || hostname === 'localhost' || hostname === '127.0.0.1';
    }

    function renderDeployTimestamp() {
      const deployLabel = document.getElementById('deploy-timestamp');
      if (!deployLabel) {
        return;
      }

      const copy = LANGUAGE_COPY[currentLanguage] || LANGUAGE_COPY.en;
      const timestamp = isLocalPreview() ? localUpdatedAt : deployMetadata?.deployedAt;
      const label = isLocalPreview() ? copy.localLabel : copy.deployLabel;
      if (!timestamp) {
        deployLabel.textContent = '';
        return;
      }

      deployLabel.textContent = `${label}: ${formatDeployTimestamp(timestamp, currentLanguage)}`;
    }

    async function loadDeployMetadata() {
      if (isLocalPreview()) {
        return;
      }

      try {
        const response = await fetch(DEPLOY_META_URL, { cache: 'no-store' });
        if (!response.ok) {
          return;
        }

        deployMetadata = await response.json();
        renderDeployTimestamp();
      } catch (error) {
        // Keep the footer clean if deployment metadata is unavailable.
      }
    }

    async function loadLocalUpdateTimestamp() {
      if (!isLocalPreview()) {
        return;
      }

      const sources = [
        `index.html?v=${DECK_VERSION}`,
        `open-location-stack.css?v=${DECK_VERSION}`,
        DECK_SOURCES.en,
        DECK_SOURCES.de
      ];

      try {
        const responses = await Promise.all(
          sources.map(async source => {
            try {
              const response = await fetch(source, {
                method: 'HEAD',
                cache: 'no-store'
              });
              return response.ok ? response.headers.get('Last-Modified') || '' : '';
            } catch (error) {
              return '';
            }
          })
        );

        const latest = responses
          .map(value => new Date(value))
          .filter(date => !Number.isNaN(date.getTime()))
          .sort((a, b) => b.getTime() - a.getTime())[0];

        if (latest) {
          localUpdatedAt = latest.toISOString();
          renderDeployTimestamp();
        }
      } catch (error) {
        // Keep the footer clean if local timestamp probing fails.
      }
    }

    function syncBackgroundClasses() {
      const slides = Array.from(document.querySelectorAll('.reveal .slides > section'));
      const backgrounds = Array.from(document.querySelectorAll('.reveal .backgrounds > .slide-background'));
      const sharedCount = Math.min(slides.length, backgrounds.length);

      for (let i = 0; i < sharedCount; i += 1) {
        const slide = slides[i];
        const background = backgrounds[i];
        const hasBackgroundVideo = slide.hasAttribute('data-background-video');
        const hasBackgroundImage = slide.hasAttribute('data-background-image');

        background.classList.toggle('is-proposal-cover', slide.classList.contains('proposal-cover'));
        background.classList.toggle('is-end-cover', slide.classList.contains('end-cover'));
        background.classList.toggle('is-image-background', hasBackgroundImage);
        background.classList.toggle('is-hero-video-slide', slide.classList.contains('hero-video-slide') && hasBackgroundVideo);
        background.classList.toggle('is-platform-video-slide', slide.classList.contains('platform-video-slide') && hasBackgroundVideo);
      }
    }

    function syncProgressTicks() {
      const progress = document.querySelector('.reveal .progress');
      const progressFill = progress?.querySelector('span:not(.progress-hover-fill)');
      const hoverFill = progress?.querySelector('.progress-hover-fill');
      if (!progress) {
        return;
      }

      const totalSlides = Math.max(1, Reveal.getTotalSlides());
      const activeSlide = Math.min(totalSlides, Reveal.getSlidePastCount() + 1);
      const segmentPercent = 100 / totalSlides;
      const fillPercent = segmentPercent * activeSlide;
      const segmentSizePx = progress.clientWidth / totalSlides;

      progress.style.setProperty('--slide-count', String(totalSlides));
      progress.style.setProperty('--active-slide', String(activeSlide));
      progress.style.setProperty('--segment-percent', `${segmentPercent}%`);
      progress.style.setProperty('--segment-size-px', `${segmentSizePx}px`);
      progress.style.setProperty('--active-fill-percent', `${fillPercent}%`);
      progress.style.setProperty('--hover-start-percent', `${fillPercent}%`);

      if (progressFill) {
        progressFill.style.width = `${fillPercent}%`;
      }

      if (hoverFill && (!progress.dataset.hoverActive || progress.dataset.hoverActive === 'false')) {
        hoverFill.style.left = `${fillPercent}%`;
        hoverFill.style.width = '0%';
      }

      if (!progress.dataset.hoverActive) {
        progress.style.setProperty('--hover-fill-percent', '0%');
      }
    }

    function clearProgressHover() {
      const progress = document.querySelector('.reveal .progress');
      const hoverFill = progress?.querySelector('.progress-hover-fill');
      if (!progress) {
        return;
      }

      progress.dataset.hoverActive = 'false';
      progress.style.setProperty('--hover-start-percent', progress.style.getPropertyValue('--active-fill-percent') || '0%');
      progress.style.setProperty('--hover-fill-percent', '0%');
      if (hoverFill) {
        hoverFill.style.left = progress.style.getPropertyValue('--active-fill-percent') || '0%';
        hoverFill.style.width = '0%';
      }
    }

    function getProgressHoverSlide(event, progress, totalSlides) {
      const rect = progress.getBoundingClientRect();
      const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      return Math.min(totalSlides, Math.max(1, Math.floor(ratio * totalSlides) + 1));
    }

    function handleProgressHover(event) {
      if (typeof Reveal.isOverview === 'function' && Reveal.isOverview()) {
        return;
      }

      const progress = event.currentTarget;
      const hoverFill = progress?.querySelector('.progress-hover-fill');
      const totalSlides = Reveal.getTotalSlides();
      if (!progress || totalSlides <= 1) {
        return;
      }

      const activeSlide = Math.min(totalSlides, Reveal.getSlidePastCount() + 1);
      const hoveredSlide = getProgressHoverSlide(event, progress, totalSlides);
      const activeFillPercent = (activeSlide / totalSlides) * 100;
      const hoveredFillPercent = (hoveredSlide / totalSlides) * 100;
      const isFutureHover = hoveredSlide > activeSlide;

      progress.style.setProperty('--hover-start-percent', `${activeFillPercent}%`);
      progress.style.setProperty(
        '--hover-fill-percent',
        isFutureHover ? `${Math.max(0, hoveredFillPercent - activeFillPercent)}%` : '0%'
      );
      progress.dataset.hoverActive = isFutureHover ? 'true' : 'false';

      if (hoverFill) {
        hoverFill.style.left = `${activeFillPercent}%`;
        hoverFill.style.width = isFutureHover ? `${Math.max(0, hoveredFillPercent - activeFillPercent)}%` : '0%';
      }
    }

    function mountFooterControls() {
      const controls = document.querySelector('.reveal .controls');
      const footerNav = document.querySelector('.slide-footer .footer-nav');
      const overviewToggle = footerNav?.querySelector('.overview-toggle');
      if (!controls || !footerNav) {
        return;
      }

      controls.classList.add('footer-controls');

      if (overviewToggle) {
        footerNav.insertBefore(controls, overviewToggle);
      } else if (controls.parentElement !== footerNav) {
        footerNav.appendChild(controls);
      }

    }

    function ensureProgressHoverFill() {
      const progress = document.querySelector('.reveal .progress');
      if (!progress || progress.querySelector('.progress-hover-fill')) {
        return;
      }

      const hoverFill = document.createElement('div');
      hoverFill.className = 'progress-hover-fill';
      hoverFill.setAttribute('aria-hidden', 'true');
      progress.appendChild(hoverFill);
    }

    function relayoutSoon() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          Reveal.layout();
          fitCurrentSlide();
          syncChromeSoon();
        });
      });
    }

    function syncChromeSoon() {
      const currentSlide = Reveal.getCurrentSlide();
      if (!currentSlide) {
        return;
      }

      syncChrome(currentSlide);
      requestAnimationFrame(() => syncChrome(currentSlide));
      setTimeout(() => syncChrome(Reveal.getCurrentSlide()), 120);
      setTimeout(() => syncChrome(Reveal.getCurrentSlide()), 360);
      setTimeout(() => syncChrome(Reveal.getCurrentSlide()), 800);
    }

    function fitSlide(slide) {
      if (!slide || slide.classList.contains('stack')) {
        return;
      }

      slide.style.zoom = '';
      slide.classList.remove('is-auto-fitted');

      if (typeof Reveal.isOverview === 'function' && Reveal.isOverview()) {
        return;
      }

      const maxIterations = 8;
      const minZoom = 0.48;
      const footer = document.querySelector('.slide-footer');

      for (let i = 0; i < maxIterations; i += 1) {
        const visibleBottom =
          footer && footer.style.display !== 'none'
            ? footer.getBoundingClientRect().top - 8
            : window.innerHeight - 8;

        const visibleChildren = Array.from(slide.children).filter(child => {
          const style = window.getComputedStyle(child);
          return style.display !== 'none' && style.visibility !== 'hidden';
        });

        const contentBottom = visibleChildren.reduce((maxBottom, child) => {
          return Math.max(maxBottom, child.getBoundingClientRect().bottom);
        }, slide.getBoundingClientRect().top);

        const overflow = contentBottom - visibleBottom;
        if (overflow <= 2) {
          break;
        }

        const currentZoom = Number.parseFloat(slide.style.zoom || '1');
        const availableHeight = Math.max(1, visibleBottom - slide.getBoundingClientRect().top);
        const contentHeight = Math.max(1, contentBottom - slide.getBoundingClientRect().top);
        const nextZoom = Math.max(minZoom, currentZoom * (availableHeight / contentHeight));

        if (Math.abs(nextZoom - currentZoom) < 0.003) {
          break;
        }

        slide.style.zoom = nextZoom.toFixed(3);
        slide.classList.add('is-auto-fitted');
      }
    }

    function fitCurrentSlide() {
      fitSlide(Reveal.getCurrentSlide());
    }

    function resetAllSlideFitting() {
      document.querySelectorAll('.reveal .slides section').forEach(slide => {
        if (slide.classList.contains('stack')) {
          return;
        }
        slide.style.zoom = '';
        slide.classList.remove('is-auto-fitted');
      });
    }

    let overviewWheelAccum = 0;
    let overviewWheelLockUntil = 0;
    let overviewEdgeDirection = 0;
    let overviewEdgeTickHandle = 0;
    let overviewEdgeLastStepAt = 0;

    function stopOverviewEdgeScroll() {
      overviewEdgeDirection = 0;
      overviewEdgeLastStepAt = 0;

      if (overviewEdgeTickHandle) {
        cancelAnimationFrame(overviewEdgeTickHandle);
        overviewEdgeTickHandle = 0;
      }
    }

    function runOverviewEdgeScroll(now) {
      if (!(typeof Reveal.isOverview === 'function' && Reveal.isOverview()) || overviewEdgeDirection === 0) {
        overviewEdgeTickHandle = 0;
        return;
      }

      if (!overviewEdgeLastStepAt || now - overviewEdgeLastStepAt >= 275) {
        if (overviewEdgeDirection > 0) {
          Reveal.right();
        } else {
          Reveal.left();
        }

        overviewEdgeLastStepAt = now;
      }

      overviewEdgeTickHandle = requestAnimationFrame(runOverviewEdgeScroll);
    }

    function startOverviewEdgeScroll(direction) {
      if (overviewEdgeDirection === direction && overviewEdgeTickHandle) {
        return;
      }

      overviewEdgeDirection = direction;
      overviewEdgeLastStepAt = 0;

      if (!overviewEdgeTickHandle) {
        overviewEdgeTickHandle = requestAnimationFrame(runOverviewEdgeScroll);
      }
    }

    function handleOverviewPointerMove(event) {
      if (!(typeof Reveal.isOverview === 'function' && Reveal.isOverview())) {
        stopOverviewEdgeScroll();
        return;
      }

      const edgeZone = Math.max(120, Math.round(window.innerWidth * 0.16));
      const leftThreshold = edgeZone;
      const rightThreshold = window.innerWidth - edgeZone;

      if (event.clientX <= leftThreshold) {
        startOverviewEdgeScroll(-1);
        return;
      }

      if (event.clientX >= rightThreshold) {
        startOverviewEdgeScroll(1);
        return;
      }

      stopOverviewEdgeScroll();
    }

    function handleOverviewWheel(event) {
      if (!(typeof Reveal.isOverview === 'function' && Reveal.isOverview())) {
        overviewWheelAccum = 0;
        return;
      }

      const now = Date.now();
      if (now < overviewWheelLockUntil) {
        event.preventDefault();
        return;
      }

      const axisDelta =
        Math.abs(event.deltaX) > Math.abs(event.deltaY)
          ? event.deltaX
          : event.deltaY;

      if (Math.abs(axisDelta) < 4) {
        return;
      }

      event.preventDefault();
      overviewWheelAccum += axisDelta;

      if (Math.abs(overviewWheelAccum) < 36) {
        return;
      }

      if (overviewWheelAccum > 0) {
        Reveal.right();
      } else {
        Reveal.left();
      }

      overviewWheelAccum = 0;
      overviewWheelLockUntil = now + 180;
    }

    function handleProgressClick(event) {
      event.preventDefault();
      event.stopPropagation();

      if (typeof Reveal.isOverview === 'function' && Reveal.isOverview()) {
        return;
      }

      const progress = event.currentTarget;
      const totalSlides = Reveal.getTotalSlides();
      if (!progress || totalSlides <= 1) {
        return;
      }

      const targetIndex = getProgressHoverSlide(event, progress, totalSlides) - 1;
      Reveal.slide(targetIndex);
    }

    function handleViewportSlideClick(event) {
      if (typeof Reveal.isOverview === 'function' && Reveal.isOverview()) {
        return;
      }

      if (
        event.defaultPrevented ||
        event.button !== 0 ||
        event.metaKey ||
        event.ctrlKey ||
        event.shiftKey ||
        event.altKey
      ) {
        return;
      }

      if (
        event.target.closest(
          'a, button, input, select, textarea, summary, details, video, iframe, .slide-footer, .controls, .progress, .overview-toggle, .language-switch, .theme-menu-toggle, .theme-modal'
        )
      ) {
        return;
      }

      const activeSlide = document.querySelector('.reveal .slides section.present:not(.stack)');
      if (!activeSlide) {
        return;
      }

      if (event.target === activeSlide || activeSlide.contains(event.target)) {
        return;
      }

      if (event.clientX < window.innerWidth / 2) {
        Reveal.left();
        return;
      }

      if (event.clientX >= window.innerWidth / 2) {
        Reveal.right();
      }
    }

    function updateExternalLinks(scope = document) {
      scope.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (!href) {
          return;
        }

        const isExternal = /^https?:\/\//i.test(href) || /^mailto:/i.test(href);
        if (!isExternal) {
          return;
        }

        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noreferrer noopener');
      });
    }

    function watchSlideImages(slide) {
      slide.querySelectorAll('img').forEach(img => {
        if (!img.complete) {
          img.addEventListener('load', relayoutSoon, { once: true });
          img.addEventListener('error', relayoutSoon, { once: true });
        }
      });

      slide.querySelectorAll('video').forEach(video => {
        if (video.readyState < 1) {
          video.addEventListener('loadedmetadata', relayoutSoon, { once: true });
          video.addEventListener('error', relayoutSoon, { once: true });
        }
      });
    }

    function resetSlideGifs(slide) {
      if (!slide) {
        return;
      }

      slide.querySelectorAll('img[data-reset-on-show="true"]').forEach(img => {
        const originalSrc = img.dataset.originalSrc || img.getAttribute('src');
        if (!originalSrc) {
          return;
        }

        img.dataset.originalSrc = originalSrc;

        const separator = originalSrc.includes('?') ? '&' : '?';
        const resetSrc = `${originalSrc}${separator}restart=${Date.now()}`;
        img.setAttribute('src', resetSrc);
      });

      slide.querySelectorAll('video[data-reset-on-show="true"]').forEach(video => {
        video.currentTime = 0;
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => { });
        }
      });
    }

    const preferredLanguage = getPreferredLanguage();
    const preferredTheme = getPreferredTheme();
    currentLanguage = preferredLanguage;
    currentTheme = preferredTheme;
    applyTheme(currentTheme);
    applyDeckSource(currentLanguage);
    applyLanguageMetadata(currentLanguage);

    Reveal.initialize({
      hash: true,
      hashOneBasedIndex: true,
      transition: 'fade',
      backgroundTransition: 'fade',
      plugins: [RevealNotes, RevealMarkdown],
      overview: true,
      controls: true,
      progress: true,
      slideNumber: false,
      center: true
    });

    Reveal.on('ready', event => {
      applyThemeBackgrounds();
      syncBackgroundClasses();
      mountFooterControls();
      ensureProgressHoverFill();
      loadDeployMetadata();
      loadLocalUpdateTimestamp();
      syncChromeSoon();
      updateSlideCount();
      syncProgressTicks();
      updateExternalLinks();
      resetSlideGifs(event.currentSlide);
      watchSlideImages(event.currentSlide);
      relayoutSoon();
    });

    Reveal.on('slidechanged', event => {
      syncBackgroundClasses();
      syncChromeSoon();
      updateSlideCount();
      syncProgressTicks();
      updateExternalLinks(event.currentSlide);
      resetSlideGifs(event.currentSlide);
      watchSlideImages(event.currentSlide);
      relayoutSoon();
    });

    Reveal.on('overviewshown', () => {
      syncBackgroundClasses();
      resetAllSlideFitting();
      syncChromeSoon();
      requestAnimationFrame(() => Reveal.layout());
    });

    Reveal.on('overviewhidden', () => {
      stopOverviewEdgeScroll();
      syncChromeSoon();
      relayoutSoon();
    });

    window.addEventListener('load', relayoutSoon, { once: true });
    window.addEventListener('resize', relayoutSoon);
    window.addEventListener('wheel', handleOverviewWheel, { passive: false });
    window.addEventListener('mousemove', handleOverviewPointerMove, { passive: true });
    window.addEventListener('mouseleave', stopOverviewEdgeScroll, { passive: true });
    window.addEventListener('blur', stopOverviewEdgeScroll);
    document.querySelector('.reveal .progress')?.addEventListener('mouseenter', handleProgressHover, true);
    document.querySelector('.reveal .progress')?.addEventListener('mousemove', handleProgressHover, true);
    document.querySelector('.reveal .progress')?.addEventListener('pointermove', handleProgressHover, true);
    document.querySelector('.reveal .progress')?.addEventListener('mouseleave', clearProgressHover, true);
    document.querySelector('.reveal .progress')?.addEventListener('click', handleProgressClick, true);
    document.querySelector('.reveal-viewport')?.addEventListener('click', handleViewportSlideClick, true);
    document.querySelector('.overview-toggle')?.addEventListener('click', () => {
      Reveal.toggleOverview();
    });
    document.querySelectorAll('.language-option').forEach(button => {
      button.addEventListener('click', () => {
        switchDeckLanguage(button.dataset.language || 'en');
      });
    });

    document.querySelectorAll('.theme-option').forEach(button => {
      button.addEventListener('click', () => {
        switchDeckTheme(button.dataset.theme || 'lear');
        closeThemeModal();
      });
    });
    document.querySelector('.theme-menu-toggle')?.addEventListener('click', () => {
      const modal = document.getElementById('theme-modal');
      if (modal?.hidden) {
        openThemeModal();
      } else {
        closeThemeModal();
      }
    });
    document.querySelector('.theme-modal-close')?.addEventListener('click', closeThemeModal);
    document.getElementById('theme-modal-backdrop')?.addEventListener('click', closeThemeModal);
    window.addEventListener('keydown', event => {
      if (event.key === 'Escape' && !document.getElementById('theme-modal')?.hidden) {
        closeThemeModal();
      }
    });
    new MutationObserver(() => syncChromeSoon()).observe(document.body, {
      childList: true,
      subtree: true
    });

  </script>

</body>

</html>
