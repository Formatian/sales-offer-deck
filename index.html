<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FORMATION x Lear Corp. Production Rollout</title>
  <link rel="icon" type="image/svg+xml" href="assets/open-location-stack-logo.svg" />
  <link rel="stylesheet" href="https://unpkg.com/reveal.js@5.0.5/dist/reveal.css" />
  <link rel="stylesheet" href="open-location-stack.css?v=20260402d" />
</head>

<body>
  <div class="reveal">
    <div class="slides">
      <section data-markdown="slides.md?v=20260402c" data-separator="^---$" data-separator-vertical="^--$"
        data-separator-notes="^Note:"></section>
    </div>
  </div>

  <a class="corner-brand" href="#/" aria-label="Back to start slide">
    <img src="assets/formation-logo-text-white.png" alt="FORMATION" />
  </a>

  <div class="slide-footer">
    <div class="footer-meta">
      <span>&copy; 2026 FORMATION GmbH</span>
      <a href="https://tryformation.com" target="_blank" rel="noreferrer noopener">TRYFORMATION.COM</a>
    </div>
    <div class="footer-nav">
      <span id="slide-counter"></span>
      <button type="button" class="overview-toggle" aria-label="Toggle slide overview" title="Slide overview">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="7" height="7" rx="1.2"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.2"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.2"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.2"></rect>
        </svg>
      </button>
    </div>
  </div>

  <script src="https://unpkg.com/reveal.js@5.0.5/dist/reveal.js"></script>
  <script src="https://unpkg.com/reveal.js@5.0.5/plugin/notes/notes.js"></script>
  <script src="https://unpkg.com/reveal.js@5.0.5/plugin/markdown/markdown.js"></script>

  <script>
    Reveal.initialize({
      hash: true,
      hashOneBasedIndex: true,
      transition: 'fade',
      backgroundTransition: 'fade',
      plugins: [RevealNotes, RevealMarkdown],
      overview: true,
      controls: true,
      progress: true,
      slideNumber: false,
      center: true
    });

    function syncChrome(slide) {
      const isOverview = typeof Reveal.isOverview === 'function' ? Reveal.isOverview() : false;
      const indices = Reveal.getIndices(slide);
      const totalSlides = Reveal.getTotalSlides();
      const isFirstSlide = indices.h === 0;
      const isLastSlide = indices.h === totalSlides - 1;
      const isPlatformVideoSlide = slide.classList.contains('platform-video-slide');
      const isTitle = slide.classList.contains('title-slide') || isFirstSlide || isLastSlide;
      const keepFooterVisible = isFirstSlide || isLastSlide;
      const isCoverSlide =
        slide.classList.contains('proposal-cover') ||
        slide.classList.contains('end-cover') ||
        isFirstSlide ||
        isLastSlide;
      const activeBackground = document.querySelector('.backgrounds .slide-background.present');
      const isVideoHero =
        slide.classList.contains('hero-video-slide') ||
        isCoverSlide ||
        slide.hasAttribute('data-background-video') ||
        !!activeBackground?.querySelector('video');
      document.querySelector('.slide-footer').style.display =
        (isOverview || (isTitle && !keepFooterVisible)) ? 'none' : '';
      document.querySelector('.corner-brand').style.display = isTitle || isOverview ? 'none' : '';
      document.body.classList.toggle('overview-active', isOverview);
      document.querySelector('.reveal-viewport')?.classList.toggle('video-slide-active', isVideoHero);
      document.body.classList.toggle('video-slide-active', isVideoHero);
      document.body.classList.toggle('cover-slide-active', isCoverSlide);
      document.body.classList.toggle('platform-video-active', isPlatformVideoSlide);
      syncActiveVideoPlayback({ isPlatformVideoSlide });
    }

    function syncActiveVideoPlayback({ isPlatformVideoSlide }) {
      const activeVideo = document.querySelector('.backgrounds .slide-background.present video');
      if (!activeVideo) {
        return;
      }

      activeVideo.playbackRate = isPlatformVideoSlide ? 0.58 : 1;
      activeVideo.muted = true;
      activeVideo.loop = true;

      const playPromise = activeVideo.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(() => { });
      }
    }

    function updateSlideCount() {
      const footer = document.getElementById('slide-counter');
      const idx = Reveal.getSlidePastCount() + 1;
      const total = Reveal.getTotalSlides();
      footer.textContent = `Slide ${idx} of ${total}`;
    }

    function syncProgressTicks() {
      const progress = document.querySelector('.reveal .progress');
      const progressFill = progress?.querySelector('span');
      if (!progress) {
        return;
      }

      const totalSlides = Math.max(1, Reveal.getTotalSlides());
      const activeSlide = Math.min(totalSlides, Reveal.getSlidePastCount() + 1);
      const segmentPercent = 100 / totalSlides;
      const fillPercent = segmentPercent * activeSlide;

      progress.style.setProperty('--slide-count', String(totalSlides));
      progress.style.setProperty('--active-slide', String(activeSlide));
      progress.style.setProperty('--segment-percent', `${segmentPercent}%`);

      if (progressFill) {
        progressFill.style.width = `${fillPercent}%`;
      }
    }

    function mountFooterControls() {
      const controls = document.querySelector('.reveal .controls');
      const footerNav = document.querySelector('.slide-footer .footer-nav');
      const overviewToggle = footerNav?.querySelector('.overview-toggle');
      if (!controls || !footerNav) {
        return;
      }

      controls.classList.add('footer-controls');

      if (overviewToggle) {
        footerNav.insertBefore(controls, overviewToggle);
      } else if (controls.parentElement !== footerNav) {
        footerNav.appendChild(controls);
      }
    }

    function relayoutSoon() {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          Reveal.layout();
          fitCurrentSlide();
          syncChromeSoon();
        });
      });
    }

    function syncChromeSoon() {
      const currentSlide = Reveal.getCurrentSlide();
      if (!currentSlide) {
        return;
      }

      syncChrome(currentSlide);
      requestAnimationFrame(() => syncChrome(currentSlide));
      setTimeout(() => syncChrome(Reveal.getCurrentSlide()), 120);
      setTimeout(() => syncChrome(Reveal.getCurrentSlide()), 360);
      setTimeout(() => syncChrome(Reveal.getCurrentSlide()), 800);
    }

    function fitSlide(slide) {
      if (!slide || slide.classList.contains('stack')) {
        return;
      }

      slide.style.zoom = '';
      slide.classList.remove('is-auto-fitted');

      if (typeof Reveal.isOverview === 'function' && Reveal.isOverview()) {
        return;
      }

      const maxIterations = 8;
      const minZoom = 0.48;
      const footer = document.querySelector('.slide-footer');

      for (let i = 0; i < maxIterations; i += 1) {
        const visibleBottom =
          footer && footer.style.display !== 'none'
            ? footer.getBoundingClientRect().top - 8
            : window.innerHeight - 8;

        const visibleChildren = Array.from(slide.children).filter(child => {
          const style = window.getComputedStyle(child);
          return style.display !== 'none' && style.visibility !== 'hidden';
        });

        const contentBottom = visibleChildren.reduce((maxBottom, child) => {
          return Math.max(maxBottom, child.getBoundingClientRect().bottom);
        }, slide.getBoundingClientRect().top);

        const overflow = contentBottom - visibleBottom;
        if (overflow <= 2) {
          break;
        }

        const currentZoom = Number.parseFloat(slide.style.zoom || '1');
        const availableHeight = Math.max(1, visibleBottom - slide.getBoundingClientRect().top);
        const contentHeight = Math.max(1, contentBottom - slide.getBoundingClientRect().top);
        const nextZoom = Math.max(minZoom, currentZoom * (availableHeight / contentHeight));

        if (Math.abs(nextZoom - currentZoom) < 0.003) {
          break;
        }

        slide.style.zoom = nextZoom.toFixed(3);
        slide.classList.add('is-auto-fitted');
      }
    }

    function fitCurrentSlide() {
      fitSlide(Reveal.getCurrentSlide());
    }

    function resetAllSlideFitting() {
      document.querySelectorAll('.reveal .slides section').forEach(slide => {
        if (slide.classList.contains('stack')) {
          return;
        }
        slide.style.zoom = '';
        slide.classList.remove('is-auto-fitted');
      });
    }

    let overviewWheelAccum = 0;
    let overviewWheelLockUntil = 0;

    function handleOverviewWheel(event) {
      if (!(typeof Reveal.isOverview === 'function' && Reveal.isOverview())) {
        overviewWheelAccum = 0;
        return;
      }

      const now = Date.now();
      if (now < overviewWheelLockUntil) {
        event.preventDefault();
        return;
      }

      const axisDelta =
        Math.abs(event.deltaX) > Math.abs(event.deltaY)
          ? event.deltaX
          : event.deltaY;

      if (Math.abs(axisDelta) < 4) {
        return;
      }

      event.preventDefault();
      overviewWheelAccum += axisDelta;

      if (Math.abs(overviewWheelAccum) < 36) {
        return;
      }

      if (overviewWheelAccum > 0) {
        Reveal.right();
      } else {
        Reveal.left();
      }

      overviewWheelAccum = 0;
      overviewWheelLockUntil = now + 180;
    }

    function handleProgressClick(event) {
      event.preventDefault();
      event.stopPropagation();

      if (typeof Reveal.isOverview === 'function' && Reveal.isOverview()) {
        return;
      }

      const progress = event.currentTarget;
      const totalSlides = Reveal.getTotalSlides();
      if (!progress || totalSlides <= 1) {
        return;
      }

      const rect = progress.getBoundingClientRect();
      const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      const targetIndex = Math.min(totalSlides - 1, Math.round(ratio * (totalSlides - 1)));
      Reveal.slide(targetIndex);
    }

    function updateExternalLinks(scope = document) {
      scope.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (!href) {
          return;
        }

        const isExternal = /^https?:\/\//i.test(href) || /^mailto:/i.test(href);
        if (!isExternal) {
          return;
        }

        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noreferrer noopener');
      });
    }

    function watchSlideImages(slide) {
      slide.querySelectorAll('img').forEach(img => {
        if (!img.complete) {
          img.addEventListener('load', relayoutSoon, { once: true });
          img.addEventListener('error', relayoutSoon, { once: true });
        }
      });

      slide.querySelectorAll('video').forEach(video => {
        if (video.readyState < 1) {
          video.addEventListener('loadedmetadata', relayoutSoon, { once: true });
          video.addEventListener('error', relayoutSoon, { once: true });
        }
      });
    }

    function resetSlideGifs(slide) {
      if (!slide) {
        return;
      }

      slide.querySelectorAll('img[data-reset-on-show="true"]').forEach(img => {
        const originalSrc = img.dataset.originalSrc || img.getAttribute('src');
        if (!originalSrc) {
          return;
        }

        img.dataset.originalSrc = originalSrc;

        const separator = originalSrc.includes('?') ? '&' : '?';
        const resetSrc = `${originalSrc}${separator}restart=${Date.now()}`;
        img.setAttribute('src', resetSrc);
      });

      slide.querySelectorAll('video[data-reset-on-show="true"]').forEach(video => {
        video.currentTime = 0;
        const playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => { });
        }
      });
    }

    Reveal.on('ready', event => {
      mountFooterControls();
      syncChromeSoon();
      updateSlideCount();
      syncProgressTicks();
      updateExternalLinks();
      resetSlideGifs(event.currentSlide);
      watchSlideImages(event.currentSlide);
      relayoutSoon();
    });

    Reveal.on('slidechanged', event => {
      syncChromeSoon();
      updateSlideCount();
      syncProgressTicks();
      updateExternalLinks(event.currentSlide);
      resetSlideGifs(event.currentSlide);
      watchSlideImages(event.currentSlide);
      relayoutSoon();
    });

    Reveal.on('overviewshown', () => {
      resetAllSlideFitting();
      syncChromeSoon();
      requestAnimationFrame(() => Reveal.layout());
    });

    Reveal.on('overviewhidden', () => {
      syncChromeSoon();
      relayoutSoon();
    });

    window.addEventListener('load', relayoutSoon, { once: true });
    window.addEventListener('resize', relayoutSoon);
    window.addEventListener('wheel', handleOverviewWheel, { passive: false });
    document.querySelector('.reveal .progress')?.addEventListener('click', handleProgressClick, true);
    document.querySelector('.overview-toggle')?.addEventListener('click', () => {
      Reveal.toggleOverview();
    });
    new MutationObserver(() => syncChromeSoon()).observe(document.body, {
      childList: true,
      subtree: true
    });
  </script>

</body>

</html>
